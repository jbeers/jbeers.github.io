<html>
<head>
</head>
<body>
	<h1>Cam Test</h1>
	<button>
	Click for Camera
	</button>
	<script type='text/javascript'>
		var button = document.querySelector( 'button' );

		button.onclick = function(){

			try{
				if( navigator.camera ){
					navigator.camera.getPicture( function(){
						alert( 'picture taken' );
					},
					function(){
						alert( 'error' );
					});
				}
				else{
					alert( "can't access the camera" );
				}
			}
			catch( e ){
				alert( e );
			}
		}
	</script>
</body>
</html>
