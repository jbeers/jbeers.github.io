<html>
<head>
	<link rel="manifest" href="/manifest.json">
</head>
<body>
	<button>
	Click for Camera
	</button>
	<button id="web">
	Click for Web Camera
	</button>
	<script type='text/javascript'>
		var button = document.querySelector( 'button' );
		var web = document.querySelector( '#web' );

		button.onclick = function(){

			try{
				if( navigator.camera ){
					navigator.camera.getPicture( function(){
						alert( 'picture taken' );
					},
					function(){
						alert( 'error' );
					});
				}
				else{
					alert( "can't access the camera" );
				}
			}
			catch( e ){
				alert( e );
			}
		}

		web.onclick = function(){
			window.location = 'https://jbeers.github.io/cam'
		}
	</script>
</body>
</html>
