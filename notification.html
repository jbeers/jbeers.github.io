<!DOCTYPE>
<html>
<head>
</head>
<body>
	<button id="updateBtn">update service worker</button>
	<script>
		(async function(){
			const btn = document.querySelector( '#updateBtn' );
			let registration = '';

			btn.addEventListener( 'click', () => {
				if( !registration ){
					alert( 'no good!' );
					return;
				}

				registration.update();
			});

			const permission = await Notification.requestPermission();
			if('serviceWorker' in navigator) {
			  navigator.serviceWorker
			           .register('/sw.js')
			           .then(function( registration ) { registration = registration });
			}
		})();
		
	</script>
</body>
</html>
